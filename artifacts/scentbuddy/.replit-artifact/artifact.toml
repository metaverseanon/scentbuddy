kind = "mobile"
previewPath = "/"
title = "ScentBuddy"
version = "1.0.0"
id = "artifacts/scentbuddy"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23216

[services.development]
run = "pnpm --filter @workspace/scentbuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scentbuddy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/scentbuddy", "run", "serve" ]

[services.env]
PORT = "23216"
BASE_PATH = "/"
